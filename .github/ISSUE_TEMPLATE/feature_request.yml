name: Feature request
description: Suggest a new capability or improvement
title: "[FEATURE] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please share enough detail to evaluate the use case and how it would fit the plugin.

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What the feature is and the problem it solves.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Who benefits and how they would use this in practice.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How you imagine the feature working.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: poi-types
    attributes:
      label: Data sources, POI types, and resources
      description: If the request involves a specific data source (ActiveCaptain, OpenSeaMap, USCG Light List, or NOAA ENC Direct), specific POI types, or Signal K resource paths, list them here.
      placeholder: |
        Data source: OpenSeaMap
        POI types: LocalKnowledge, Navigational
        Signal K resource: resources/notes

  - type: textarea
    id: additional
    attributes:
      label: Additional context
