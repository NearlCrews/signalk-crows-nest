name: Bug report
description: Report a defect in the plugin
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so the issue can be reproduced and triaged.
        For usage questions, please use [Discussions](https://github.com/KvotheBloodless/signalk-activecaptain-resources/discussions) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
      placeholder: With marinas enabled, no marina POIs appear as notes resources in Freeboard-SK.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps that consistently trigger the bug.
      placeholder: |
        1. Enable the plugin with default settings
        2. Open Freeboard-SK with a GPS position near a known marina
        3. Observe the chart layers
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: 1.2.0
    validations:
      required: true

  - type: input
    id: signalk-version
    attributes:
      label: Signal K server version
      placeholder: 2.27.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 20.18.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Debian 12 on Raspberry Pi 5
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Signal K AppStore
        - npm
        - Manual
        - Other
    validations:
      required: true

  - type: textarea
    id: poi-types
    attributes:
      label: Affected POI types
      description: Optional. If the bug is tied to specific ActiveCaptain POI types, list them.
      placeholder: Marina, Anchorage

  - type: textarea
    id: config
    attributes:
      label: Plugin configuration
      description: Paste the relevant plugin configuration (redact secrets).
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, possible causes, or anything else helpful.
