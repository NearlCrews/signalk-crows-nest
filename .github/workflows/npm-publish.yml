# This workflow builds and tests the package, then publishes it to npm when a
# release is created.
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      # Fail fast when the release tag and the package.json version disagree, so
      # a release can never publish a version that does not match its tag.
      - name: Verify the release tag matches the package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Release tag ($TAG) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    # id-token: write lets npm attach a provenance attestation to the published
    # package; contents: read is the least privilege the checkout needs.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      # prepack cleans and rebuilds dist/ and public/ before the package
      # is published, so the tarball always ships fresh artifacts.
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
