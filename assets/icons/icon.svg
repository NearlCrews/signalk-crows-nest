<?xml version="1.0" encoding="UTF-8"?>
<!--
  Signal K plugin icon for signalk-crows-nest.

  Family identity (shared across @NearlCrews Signal K plugins): rounded
  square with a deep-ocean gradient and three stacked stylized wave lines.
  Per-project differentiation: a bottom-right circle badge in a
  project-specific colour with a 2-3 shape glyph. This badge is the only
  region that varies between sibling plugins.

  This variant's badge: crimson red (#C62828) with a lighthouse
  silhouette: a tapered tower with a white window stripe, a lantern room
  with a white light dot, a peaked roof, and two beam strokes sweeping
  out from the lantern. Reads as "lookout / hazard warning" at thumbnail
  size, matching the plugin's POI and hazard-alarm role.

  Sibling badges already in use: yellow (Virtual Weather thundercloud),
  orange (NMEA 2000 Emitter radiating arcs), violet (OpenRouter
  Companion chat bubble). Red keeps the family visually separable
  at thumbnail size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Crow's Nest plugin icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E4D6B"/>
      <stop offset="1" stop-color="#1A8DAB"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background, deep-ocean gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Family motif: three stacked wave lines centered in the canvas -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.94">
    <path d="M 80,176 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,256 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,336 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
  </g>

  <!-- Project badge: bottom-right circle (crimson for lookout / alarms) -->
  <circle cx="388" cy="388" r="84" fill="#C62828" stroke="#FFFFFF" stroke-width="8"/>

  <!--
    Badge glyph: lighthouse silhouette. Four parts for read at thumbnail
    size: a tapered tower, a lantern room, a peaked roof, and two light
    beams sweeping out from the lantern. White accents (the lantern dot
    and the tower window stripe) keep the silhouette from flattening
    into a plain obelisk. Centered on the badge centre (388, 388),
    drawn in the family glyph dark (#1B3A4B).
  -->
  <g fill="#1B3A4B">
    <path d="M 374 434 L 380 370 L 396 370 L 402 434 Z"/>
    <rect x="374" y="352" width="28" height="18" rx="3"/>
    <path d="M 372 352 L 388 336 L 404 352 Z"/>
  </g>
  <g stroke="#1B3A4B" stroke-width="9" stroke-linecap="round">
    <line x1="360" y1="358" x2="338" y2="350"/>
    <line x1="416" y1="358" x2="438" y2="350"/>
  </g>
  <circle cx="388" cy="361" r="6" fill="#FFFFFF"/>
  <rect x="377" y="394" width="22" height="9" rx="4" fill="#FFFFFF"/>
</svg>
